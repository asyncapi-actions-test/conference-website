name: Sync Pretalx Schedule

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Pretalx base URL, for example https://your-test-pretalx.example.com
        required: false
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    if: github.event_name == 'workflow_dispatch' || vars.PRETALX_BASE_URL != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync public Pretalx schedule
        env:
          PRETALX_BASE_URL: ${{ github.event.inputs.base_url || vars.PRETALX_BASE_URL }}
          PRETALX_API_TOKEN: ${{ secrets.PRETALX_API_TOKEN }}
        run: npm run sync:pretalx

      - name: Create schedule update pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/sync-pretalx-schedule
          commit-message: "chore: sync pretalx schedule"
          title: Sync Pretalx schedule
          body: |
            Syncs public Pretalx events, location metadata, city images, released schedule slots, and speaker data into generated website JSON config.
            Private submissions and review data are not fetched by this workflow.
          add-paths: |
            config/pretalx/agenda.json
            config/pretalx/city-lists.json
            config/pretalx/speakers.json
